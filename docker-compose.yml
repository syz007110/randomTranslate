version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: file-translator-api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - XFYUN_APP_ID=${XFYUN_APP_ID:-}
      - XFYUN_API_KEY=${XFYUN_API_KEY:-}
      - XFYUN_API_SECRET=${XFYUN_API_SECRET:-}
      - XFYUN_TRANSLATE_URL=${XFYUN_TRANSLATE_URL:-https://ntrans.xfyun.cn/v2/ots}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - KIMI_MODEL=${KIMI_MODEL:-moonshot-v1-8k}
    depends_on:
      - redis
    ports:
      - "8088:8088"
    command: ["file-translator-web"]

  worker:
    build: .
    container_name: file-translator-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - XFYUN_APP_ID=${XFYUN_APP_ID:-}
      - XFYUN_API_KEY=${XFYUN_API_KEY:-}
      - XFYUN_API_SECRET=${XFYUN_API_SECRET:-}
      - XFYUN_TRANSLATE_URL=${XFYUN_TRANSLATE_URL:-https://ntrans.xfyun.cn/v2/ots}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - KIMI_MODEL=${KIMI_MODEL:-moonshot-v1-8k}
    depends_on:
      - redis
    command: ["file-translator-worker"]
